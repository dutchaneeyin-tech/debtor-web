<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <title>ระบบติดตามลูกหนี้ 3 ตำบล</title>

  <style>
    body {
      font-family: Tahoma, Arial, sans-serif;
      margin: 0;
      background: #f4f6f9;
      color: #222;
    }

    header {
      background: #0d6efd;
      color: white;
      padding: 20px;
      font-size: 28px;
      font-weight: bold;
      text-align: center;
    }

    .summary {
      background: white;
      padding: 20px;
      margin: 15px;
      border-radius: 12px;
      font-size: 18px;
      line-height: 2;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      border-bottom: 1px solid #eee;
      padding: 8px 0;
    }

    .summary-row:last-child {
      border-bottom: none;
    }

    .label {
      font-weight: bold;
    }

    .value {
      color: #0d6efd;
      font-weight: bold;
    }

    .buttons {
      background: white;
      padding: 15px;
      margin: 15px;
      border-radius: 12px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    button {
      background: #0d6efd;
      color: white;
      border: none;
      padding: 14px 26px;
      margin: 6px;
      border-radius: 10px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #084298;
    }

    #mapBox {
      background: white;
      margin: 15px;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    iframe {
      width: 100%;
      height: 520px;
      border: none;
      display: block;
    }

    .area-action {
      padding: 18px;
      text-align: center;
      background: #ffffff;
    }

    .detail-btn {
      background: #198754;
      font-size: 20px;
      padding: 16px 34px;
    }

    .detail-btn:hover {
      background: #146c43;
    }

    .status {
      font-size: 15px;
      color: #666;
      margin-top: 10px;
      text-align: center;
    }
  </style>
</head>

<body>

<header>ระบบติดตามลูกหนี้ 3 ตำบล</header>

<div class="summary">
  <div class="summary-row">
    <span class="label">จำนวนโครงการทั้งหมด</span>
    <span class="value"><span id="totalProjects">0</span> โครงการ</span>
  </div>

  <div class="summary-row">
    <span class="label">เงินอนุมัติรวมทั้งหมด</span>
    <span class="value"><span id="totalApproved">0.00</span> บาท</span>
  </div>

  <div class="summary-row">
    <span class="label">ลูกหนี้คงเหลือ ณ 1 ต.ค. 2568 (A)</span>
    <span class="value"><span id="totalDebtA">0.00</span> บาท</span>
  </div>

  <div class="summary-row">
    <span class="label">ยอดหนี้รวมทั้งหมด</span>
    <span class="value"><span id="totalDebt">0.00</span> บาท</span>
  </div>

  <div id="statusText" class="status">กำลังโหลดข้อมูล...</div>
</div>

<div class="buttons">
  <button onclick="showArea('กะทู้')">กะทู้</button>
  <button onclick="showArea('เมือง')">เมือง</button>
  <button onclick="showArea('ถลาง')">ถลาง</button>
</div>

<div id="mapBox">
  <iframe src="https://www.google.com/maps?q=Phuket,Thailand&z=10&output=embed"></iframe>
</div>

<script>
  const WEBHOOK_URL = "http://localhost:5678/webhook/debtor-area";

  const areas = ["กะทู้", "เมือง", "ถลาง"];

  const areaMap = {
    "กะทู้": {
      lat: 7.909,
      lng: 98.333,
      zoom: 13
    },
    "เมือง": {
      lat: 7.880,
      lng: 98.392,
      zoom: 13
    },
    "ถลาง": {
      lat: 8.034,
      lng: 98.334,
      zoom: 12
    }
  };

  function toNumber(value) {
    if (value === undefined || value === null || value === "") return 0;

    return Number(
      String(value)
        .replace(/,/g, "")
        .replace(/บาท/g, "")
        .replace(/\s/g, "")
    ) || 0;
  }

  function formatMoney(value) {
    return value.toLocaleString("th-TH", {
      minimumFractionDigits: 2,
      maximumFractionDigits: 2
    });
  }

  function normalizeRows(data) {
    if (Array.isArray(data)) return data;
    if (data && Array.isArray(data.data)) return data.data;
    if (data && typeof data === "object") return [data];
    return [];
  }

  async function fetchArea(area) {
    const url = WEBHOOK_URL + "?area=" + encodeURIComponent(area);
    const response = await fetch(url);

    if (!response.ok) {
      throw new Error("HTTP Error: " + response.status);
    }

    const data = await response.json();
    return normalizeRows(data);
  }

  async function loadSummary() {
    let totalProjects = 0;
    let totalApproved = 0;
    let totalDebtA = 0;
    let totalDebt = 0;

    const statusText = document.getElementById("statusText");
    statusText.textContent = "กำลังโหลดข้อมูล...";

    for (const area of areas) {
      try {
        const rows = await fetchArea(area);

        totalProjects += rows.length;

        rows.forEach(row => {
          totalApproved += toNumber(row["วงเงินอนุมัติ"]);
          totalDebtA += toNumber(row["ลูกหนี้คงเหลือ ณ 1 ต.ค. 2568 (A)"]);
          totalDebt += toNumber(row["ยอดหนี้คงเหลือ"]);
        });

      } catch (error) {
        console.error("โหลดข้อมูลไม่ได้:", area, error);
      }
    }

    document.getElementById("totalProjects").textContent = totalProjects;
    document.getElementById("totalApproved").textContent = formatMoney(totalApproved);
    document.getElementById("totalDebtA").textContent = formatMoney(totalDebtA);
    document.getElementById("totalDebt").textContent = formatMoney(totalDebt);

    statusText.textContent = "โหลดข้อมูลเรียบร้อย";
  }

  function showArea(area) {
    const map = areaMap[area];

    document.getElementById("mapBox").innerHTML = `
      <iframe
        src="https://www.google.com/maps?q=${map.lat},${map.lng}&z=${map.zoom}&output=embed">
      </iframe>

      <div class="area-action">
        <button class="detail-btn" onclick="goDetail('${area}')">
          ข้อมูลลูกหนี้${area}
        </button>
      </div>
    `;
  }

  function goDetail(area) {
    window.location.href = "detail.html?area=" + encodeURIComponent(area);
  }

  loadSummary();
</script>

</body>
</html>
